name: Deploy Frontend

on:
  push:
    branches:
      - main # Замени на master, если у тебя основная ветка master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Заходим в папку фронта на сервере
            cd ~/adzen-ai/front
            
            # 2. Скачиваем свежий код из GitHub
            git pull origin main
            
            # 3. Возвращаемся в папку с docker-compose.yml
            cd ~/adzen-ai
            
            # 4. Пересобираем и запускаем ТОЛЬКО контейнер фронтенда
            docker compose up -d --build frontend